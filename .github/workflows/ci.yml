name: CI

# Chạy kiểm tra tự động khi mở/cập nhật PR vào main và khi push lên main (D2).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cài dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck + Build
        run: npm run build # tsc -b (typecheck) + vite build

      - name: Test
        run: npm test
